name: Release

# Publishes all @leanandmean/pi-* packages to npm when a version tag is pushed.
# Tag format: v0.74.0-scramjet.N
# Trigger: `gh release create v<version>` or manual `git tag v<version> && git push origin v<version>`
#
# Packages published (in dependency order):
#   @leanandmean/pi-tui
#   @leanandmean/pi-ai
#   @leanandmean/pi-agent-core
#   @leanandmean/pi-coding-agent
on:
  push:
    tags: ["v[0-9]*"]

permissions:
  contents: read

jobs:
  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' packages/coding-agent/package.json)
          if [ "$TAG" != "$PKG" ]; then
            echo "Error: git tag v$TAG does not match packages/coding-agent/package.json version $PKG." >&2
            exit 1
          fi
          echo "OK: tag and package.json agree on $PKG."

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -w packages/tui -w packages/ai -w packages/agent -w packages/coding-agent

      - name: Publish all packages
        run: |
          TAG="${GITHUB_REF_NAME#v}"

          # Publish in dependency order: tui, ai, agent, coding-agent
          for PKG_DIR in packages/tui packages/ai packages/agent packages/coding-agent; do
            echo "--- Publishing $PKG_DIR ---"
            cd "$PKG_DIR"

            # Rename to @leanandmean scope
            OLD_NAME=$(jq -r '.name' package.json)
            NEW_NAME=$(echo "$OLD_NAME" | sed 's/@earendil-works\//@leanandmean\//')
            jq --arg name "$NEW_NAME" --arg version "$TAG" \
              '.name = $name | .version = $version' package.json > package.json.tmp
            mv package.json.tmp package.json

            # Rewrite internal dependency references to @leanandmean scope with exact version
            for DEP in "@earendil-works/pi-tui" "@earendil-works/pi-ai" "@earendil-works/pi-agent-core" "@earendil-works/pi-coding-agent"; do
              NEW_DEP=$(echo "$DEP" | sed 's/@earendil-works\//@leanandmean\//')
              if jq -e --arg dep "$DEP" '.dependencies[$dep]' package.json >/dev/null 2>&1; then
                jq --arg old "$DEP" --arg new "$NEW_DEP" --arg ver "$TAG" \
                  '.dependencies[$new] = $ver | del(.dependencies[$old])' package.json > package.json.tmp
                mv package.json.tmp package.json
              fi
            done

            echo "Publishing $(jq -r '.name' package.json)@$(jq -r '.version' package.json)"
            npm publish --access public --tag scramjet

            cd "$GITHUB_WORKSPACE"
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
