name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        # npm install (not ci): upstream lockfile is generated on macOS and
        # lacks linux platform entries for native optional deps (rollup,
        # parcel/watcher, etc.). npm install resolves them at install time.
        run: npm install

      - name: Build
        run: npm run build -w packages/tui -w packages/ai -w packages/agent -w packages/coding-agent

      - name: Check
        run: |
          npx biome check --error-on-warnings packages/tui packages/ai packages/agent packages/coding-agent
          npx tsgo -p packages/tui/tsconfig.build.json --noEmit
          npx tsgo -p packages/ai/tsconfig.build.json --noEmit
          npx tsgo -p packages/agent/tsconfig.build.json --noEmit
          npx tsgo -p packages/coding-agent/tsconfig.build.json --noEmit
